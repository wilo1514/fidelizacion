<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Administrador | Fidelizacion</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout admin-layout">
      <section class="hero">
        <p class="eyebrow">Mega Tienda del Sur</p>
        <h1>Acceso de administradores</h1>
        <p class="lead">Ingresa con tu usuario y clave para continuar al panel de actualizacion de clientes.</p>
      </section>

      <section class="card login-card">
        <form id="loginForm" class="form-grid">
          <label>
            <span>Usuario administrador</span>
            <input id="adminUsername" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>Clave</span>
            <input id="adminPassword" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="button button-primary">Ingresar</button>
        </form>
        <p id="loginMessage" class="feedback"></p>
      </section>
    </main>
    <script src="/admin.js" type="module"></script>
  </body>
  </html>
